OUTPUT EXACTLY AS THIS JSON SCHEMA. DO NOT ADD ANY OTHER TEXT/MARKDOWN OUTSIDE THE JSON:
{

    // ════════════════════════════════════════════════════════════════════════

    function ForensicEngineMaxGemini() {
      // Auth State
      const [user, setUser] = useState(null);
      const [creds, setCreds] = useState({ email: "", password: "" });
      const [authLoading, setAuthLoading] = useState(true);

      // App State
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("lexNovaApiKey") || "");
      const [selectedModel, setSelectedModel] = useState("gemini-3.1-flash-preview");
      
      // ID Nomenclature State (MM-Alpha)
      const [pillar, setPillar] = useState("AI");
      const [batchMonth, setBatchMonth] = useState(() => String(new Date().getMonth() + 1).padStart(2, '0'));
      const [batchAlpha, setBatchAlpha] = useState("A");

      const [inp, setInp] = useState({ companyName:"", website:"", productDescription:"", termsPage:"", fundingStage:"", founderName:"", founderTitle:"", email:"", linkedinUrl:"" });
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [status, setStatus] = useState("");
      const [pushStatus, setPushStatus] = useState("");

      // ── AUTH LISTENER ──
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async u => {
          if (u) {
            const snap = await db.collection('admins').doc(u.email).get();
            if (snap.exists) {
              setUser(u);
            } else {
              await auth.signOut();
              setError("Access Denied. You are not authorized in the Lex Nova Admin Registry.");
            }
          } else {
            setUser(null);
          }
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (apiKey) localStorage.setItem("lexNovaApiKey", apiKey);
      }, [apiKey]);

      const login = async () => {
        setAuthLoading(true);
        setError(null);
        try {
          await auth.signInWithEmailAndPassword(creds.email, creds.password);
        } catch(e) {
          setError("Invalid proprietary credentials.");
          setAuthLoading(false);
        }
      };

      const upd = (k,v) => setInp(p=>({...p,[k]:v}));

      // ── AGENTIC AUDIT EXECUTION ──
      const runAudit = async () => {
        if (!apiKey) { setError("Gemini API Key is required."); return; }
        if (!inp.companyName && !inp.website) { setError("Company name or Website is required to initiate hunt."); return; }
        
        setLoading(true); setError(null); setResult(null); setPushStatus("");
        setStatus("Initializing Agentic Scrape & Forensic Audit...");

        const msg = `AUDIT TARGET
COMPANY: ${inp.companyName || "UNKNOWN"}
WEBSITE: ${inp.website || "UNKNOWN - SEARCH REQUIRED"}
PRODUCT INPUT: ${inp.productDescription || "NONE PROVIDED - YOU MUST SCRAPE WEBSITE TO DETERMINE PRODUCT SIGNAL."}
TERMS INPUT: ${inp.termsPage || "NONE PROVIDED - YOU MUST SCRAPE OR INFER LACK OF LEGAL PAGE."}
FUNDING: ${inp.fundingStage || "UNKNOWN — YOU MUST USE GOOGLE SEARCH TO FIND LATEST FUNDING ROUND AND AMOUNT."}
FOUNDER: ${inp.founderName || "?"} / ${inp.founderTitle || "?"}
`;

        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              systemInstruction: { parts: [{ text: SYSTEM }] },
              contents: [{ role: "user", parts: [{ text: msg }] }],
              tools: [{ googleSearch: {} }], 
              generationConfig: { temperature: 0.1 } 
            })
          });

          const data = await res.json();
          if (data.error) throw new Error(data.error.message);

          setStatus("Structuring Forensic Output...");
          let raw = data.candidates[0].content.parts[0].text;
          
          raw = raw.replace(/```json|```/g, "").trim();
          const jsonMatch = raw.match(/\{[\s\S]*\}/);
          if (!jsonMatch) throw new Error("No valid JSON found in the response. Output was: " + raw);
          
          const parsed = JSON.parse(jsonMatch[0]);

          // Format Email String
          if (inp.founderName) parsed.personalizedHook = parsed.personalizedHook.replace(/\[First Name\]/gi, inp.founderName.split(" ")[0]);
          if (inp.companyName) parsed.personalizedHook = parsed.personalizedHook.replace(/\[COMPANY_NAME\]/gi, inp.companyName);
          
          parsed._meta = { ...inp, inputWebsite:inp.website };
          setResult(parsed);
        } catch(e) { 
          setError("Audit failed: " + e.message); 
        }
        setLoading(false); setStatus("");
      };

      // ── THE TRIPLE GUARD & DATA BRIDGE (NEW WORLD LOGIC) ──
      const pushToCRM = async () => {
        if (!result) return;
        setPushStatus("Running Triple Guard & Deduplication...");
        
        try {
            const targetEmail = (result._meta.email || '').toLowerCase().trim();
            const targetCompany = (result.company || result._meta.companyName || '').toLowerCase().trim();
            const yearStr = "26"; 
            
            // Reconstruct exact batch ID format: MM-Alpha (e.g. 03-A)
            const batchTag = `${batchMonth}-${batchAlpha}`; 
            const idPrefix = `LN-P-${pillar}-${yearStr}-${batchTag}-`; // e.g. LN-P-AI-26-03-A-
            
            // ── PULL ENTIRE DB FOR TRIPLE GUARD & SERIAL HUNT ──
            const allDocsSnap = await db.collection('prospects').get();
            
            let legacyDoc = null;
            let maxNum = 0;

            allDocsSnap.forEach(doc => {
                const data = doc.data();
                const docId = doc.id;
                
                // 1. THE TRIPLE GUARD MATCH
                if (!legacyDoc) {
                    const dbEmail = (data.email || '').toLowerCase().trim();
                    const dbComp = (data.company || '').toLowerCase().trim();
                    
                    if (targetEmail !== '' && (docId.toLowerCase() === targetEmail || dbEmail === targetEmail)) {
                        legacyDoc = { id: docId, data: data };
                    } else if (targetCompany !== '' && dbComp === targetCompany) {
                        legacyDoc = { id: docId, data: data };
                    }
                }

                // 2. THE SERIAL HUNTER (Finds highest serial in current MM-Alpha batch)
                const pid = data.prospectId || "";
                if (pid.startsWith(idPrefix)) {
                    const parts = pid.split('-');
                    const serialStr = parts[parts.length - 1]; // Grabs the last chunk
                    const num = parseInt(serialStr, 10);
                    if (!isNaN(num) && num > maxNum) maxNum = num;
                }
            });

            // ── DETERMINE THE FINAL PROSPECT ID (STRICT ENFORCEMENT) ──
            let finalProspectId;
            const nextNumStr = String(maxNum + 1).padStart(3, '0');
            const newlyGeneratedId = `${idPrefix}${nextNumStr}`; // Strictly e.g., LN-P-AI-26-03-A-001

            if (legacyDoc && legacyDoc.data.prospectId) {
                // If it has an old ID, check if it perfectly matches the canonical format.
                // Format: LN-P-XXX-26-XX-X-XXX
                const oldPid = legacyDoc.data.prospectId;
                const isPerfectFormat = /^LN-P-[A-Z]+-\d{2}-\d{2}-[A-Z]-\d{3}$/.test(oldPid);
                
                if (isPerfectFormat) {
                    finalProspectId = oldPid; // Preserve the perfectly formatted thread
                } else {
                    finalProspectId = newlyGeneratedId; // Overwrite the malformed legacy ID
                }
            } else {
                finalProspectId = newlyGeneratedId; // It's completely new
            }

            const scannerLink = `https://lexnovahq.com/scanner.html?pid=${finalProspectId}`;

            // Inject the ID into the email hook for the Tripwire
            let finalHook = result.personalizedHook;
            finalHook = finalHook.replace(/\[PROSPECT_ID\]/g, finalProspectId);

            // ── BUILD THE MASTER OBJECT (PRESERVE OLD, OVERWRITE NEW) ──
            const dbEmail = targetEmail || legacyDoc?.data?.email || `pending-${Date.now()}@reveal.apollo`;
            
            const prospectData = {
                // 1. SPREAD LEGACY DATA FIRST (Preserves custom notes/random fields)
                ...(legacyDoc?.data || {}),

                // 2. CORE IDENTITY (Overwrite with new if available)
                prospectId: finalProspectId,
                founderName: result._meta.founderName || legacyDoc?.data?.founderName || '',
                email: dbEmail,
                company: result.company || result._meta.companyName || legacyDoc?.data?.company || '',
                website: result.website || result._meta.inputWebsite || legacyDoc?.data?.website || '',
                linkedinUrl: result._meta.linkedinUrl || legacyDoc?.data?.linkedinUrl || '',
                jobTitle: result._meta.founderTitle || legacyDoc?.data?.jobTitle || '',
                
                // 3. LOGISTICS
                batchNumber: legacyDoc?.data?.batchNumber || batchTag, // Keep old batch if it existed
                geography: result.geography || legacyDoc?.data?.geography || 'US',
                headcount: result.headcount || legacyDoc?.data?.headcount || '1-10',
                fundingStage: result.fundingStage || legacyDoc?.data?.fundingStage || '',
                
                // 4. THE LIVE FORENSIC AUDIT (OBLITERATE OLD INTELLIGENCE)
                aiNative: result.aiNative || false,
                externalAI: result.externalAI || false,
                legalGapStatus: result.legalGapStatus || 'generic',
                legalGapAnalysis: result.legalGapAnalysis || '',
                intendedPlan: result.intendedPlan || 'agentic_shield',
                personalizedHook: finalHook,
                scannerLink: scannerLink,
                lane: result.lane || 'A',
                productSignal: result.productSignal || '',
                activeTraps: result.activeTraps || [],
                verdict: result.verdict || 'HOLD',
                verdictReason: result.verdictReason || '',
                emailSubject: result.emailSubject || '',
                
                // 5. STATUS & TRACKING (Salvaged from legacy if exists)
                status: legacyDoc?.data?.status || (result.verdict === 'GREEN LIGHT' ? 'Hot' : 'Cold'),
                hotFlag: result.verdict === 'GREEN LIGHT' || result.legalGapStatus === 'exposure',
                emailsSent: legacyDoc?.data?.emailsSent || 0,
                emailLog: legacyDoc?.data?.emailLog || [],
                scannerClicked: legacyDoc?.data?.scannerClicked || false,
                scannerCompleted: legacyDoc?.data?.scannerCompleted || false,
                addedAt: legacyDoc?.data?.addedAt || firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            // ── THE HARD LOCK EXECUTION (MIGRATE & DELETE) ──
            
            // 1. Create/Overwrite the Document named precisely as the strict ID
            await db.collection('prospects').doc(finalProspectId).set(prospectData);
            
            // 2. The Kill Switch: If we found an old file under a different name, delete it.
            if (legacyDoc && legacyDoc.id !== finalProspectId) {
                await db.collection('prospects').doc(legacyDoc.id).delete();
                console.log(`[SYSTEM] Legacy file ${legacyDoc.id} deleted and migrated to ${finalProspectId}`);
            }

            setPushStatus(`Success! Locked: ${finalProspectId}`);
            
        } catch(e) {
            console.error(e);
            setPushStatus("ERROR: Bridge Failed.");
        }
      };

      const vColor = v => ({"GREEN LIGHT":"#22c55e","HOLD":"#eab308","SKIP":"#ef4444"}[v]||"#888");
      const vIcon  = v => ({"GREEN LIGHT":"🟢","HOLD":"🟡","SKIP":"🔴"}[v]||"⚪");

      const S = {
        root:{padding:"28px 20px",maxWidth:800,margin:"0 auto"},
        card:{background:"#0c0c0c",border:"1px solid #1e1e1e",borderRadius:8,padding:"20px",marginBottom:14},
        label:{color:"#666",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:5,display:"block"},
        sHead:{color:"#C5A059",fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14},
        input:{width:"100%",background:"#080808",border:"1px solid #252525",borderRadius:5,padding:"9px 11px",color:"#e5e5e5",fontSize:12,outline:"none",boxSizing:"border-box"},
        field:{marginBottom:13},
        row2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"},
        row3:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 14px"},
      };

      // ── LOGIN SCREEN ──
      if (authLoading) return <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",color:"var(--gold)"}}>Verifying clearance...</div>;
      
      if (!user) {
        return (
          <div style={{ display: "flex", height: "100vh", alignItems: "center", justifyContent: "center" }}>
            <div style={{ background: "#0c0c0c", padding: 40, border: "1px solid var(--gold)", width: 320 }}>
              <div style={{color:"#C5A059",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:6}}>LEX NOVA HQ</div>
              <h2 className="serif" style={{ color: "#fff", margin: "0 0 20px 0" }}>Forensic Engine v4.0</h2>
              {error && <div style={{color:"#f87171",fontSize:11,marginBottom:15}}>{error}</div>}
              <input type="email" placeholder="Admin Email" style={{...S.input, marginBottom:10}} onChange={e => setCreds(p => ({...p, email: e.target.value}))} />
              <input type="password" placeholder="Passcode" style={{...S.input, marginBottom:20}} onChange={e => setCreds(p => ({...p, password: e.target.value}))} />
              <button onClick={login} className="btn" style={{ width: "100%", padding: 12, borderRadius: 4 }}>Access Engine</button>
            </div>
          </div>
        );
      }

      // ── MAIN ENGINE UI ──
      return (
        <div style={S.root}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:24}}>
            <div>
              <div style={{color:"#C5A059",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:6}}>LEX NOVA HQ · PROPRIETARY</div>
              <h1 style={{color:"#fff",fontSize:22,fontWeight:800,margin:"0 0 4px 0"}}>Forensic Engine <span style={{background:"#C5A05920",color:"#C5A059",fontSize:10,padding:"2px 8px",borderRadius:4,marginLeft:8,verticalAlign:"middle"}}>v4.0</span></h1>
              <p style={{color:"#444",fontSize:11,margin:0}}>Agentic Web Scraping · Automatic CRM Bridge Active.</p>
            </div>
            <button onClick={() => auth.signOut()} style={{background:"none",border:"none",color:"#666",fontSize:10,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.1em"}}>Sign Out</button>
          </div>

          <div style={S.card}>
            <div style={S.row2}>
              <div style={S.field}>
                <label style={S.label}>Engine / Model</label>
                <select value={selectedModel} onChange={e=>setSelectedModel(e.target.value)} style={{...S.input, borderColor:"var(--gold)", color:"var(--gold)"}}>
                  <option value="gemini-3.1-pro-preview">3.1 Pro (Deep Architect)</option>
                  <option value="gemini-3.1-flash-preview">3.1 Flash (High Speed Standard)</option>
                  <option value="gemini-3.1-flash-lite-preview">3.1 Flash-Lite (Volume Hunting)</option>
                  <option value="gemini-2.5-pro">2.5 Pro (Legacy Stable)</option>
                  <option value="gemini-2.5-flash">2.5 Flash (Legacy Speed / Free Limits)</option>
                </select>
              </div>
              <div style={S.field}>
                <label style={S.label}>Gemini API Key (Local)</label>
                <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} style={S.input} placeholder="AIzaSy..." />
              </div>
            </div>
          </div>

          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{...S.sHead,marginBottom:0}}>TARGET ACQUISITION (AGENTIC)</div>
              <div style={{display:"flex",gap:10}}>
                  <select value={pillar} onChange={e=>setPillar(e.target.value)} style={{...S.input, padding:"4px 8px", width:"auto", fontSize:10}}>
                      <option value="AI">Pillar: AI</option>
                      <option value="SS">Pillar: SS</option>
                  </select>
                  <input value={batchMonth} onChange={e=>setBatchMonth(e.target.value)} style={{...S.input, padding:"4px 8px", width:"40px", fontSize:10}} placeholder="MM"/>
                  <input value={batchAlpha} onChange={e=>setBatchAlpha(e.target.value.toUpperCase())} style={{...S.input, padding:"4px 8px", width:"40px", fontSize:10}} placeholder="A"/>
              </div>
            </div>
            
            <div style={S.row2}>
              <div style={S.field}><label style={S.label}>Company Name *</label><input value={inp.companyName} onChange={e=>upd("companyName",e.target.value)} style={S.input} placeholder="Acme AI"/></div>
              <div style={S.field}><label style={S.label}>Website URL (Enables Auto-Scrape)</label><input value={inp.website} onChange={e=>upd("website",e.target.value)} style={S.input} placeholder="https://acmeai.com"/></div>
            </div>
            
            <div style={S.row2}>
                <div style={S.field}><label style={S.label}>Product Context (Manual Override)</label><textarea rows={2} value={inp.productDescription} onChange={e=>upd("productDescription",e.target.value)} style={{...S.input,resize:"vertical"}} placeholder="Paste copy or leave blank for agentic scrape..."/></div>
                <div style={S.field}><label style={S.label}>Legal Pages (Manual Override)</label><textarea rows={2} value={inp.termsPage} onChange={e=>upd("termsPage",e.target.value)} style={{...S.input,resize:"vertical"}} placeholder="Paste ToS or leave blank for agentic scrape..."/></div>
            </div>

            <div style={S.row3}>
              <div style={S.field}><label style={S.label}>Founder Name</label><input value={inp.founderName} onChange={e=>upd("founderName",e.target.value)} style={S.input} placeholder="John Smith"/></div>
              <div style={S.field}><label style={S.label}>Founder Title</label><input value={inp.founderTitle} onChange={e=>upd("founderTitle",e.target.value)} style={S.input} placeholder="CEO / Co-Founder"/></div>
              <div style={S.field}><label style={S.label}>Target Email</label><input value={inp.email} onChange={e=>upd("email",e.target.value)} style={S.input} placeholder="john@acmeai.com"/></div>
            </div>

            <button onClick={runAudit} disabled={loading} className="btn" style={{width:"100%", padding:"14px 0", borderRadius:6, marginTop:8}}>
              {loading ? `⚙  ${status||"RUNNING FORENSIC AUDIT..."}` : `DEPLOY FORENSIC ENGINE →`}
            </button>
          </div>

          {error && <div style={{background:"#120808",border:"1px solid #2a0f0f",borderRadius:8,padding:"12px 16px",marginBottom:14,color:"#f87171",fontSize:12}}>⚠ {error}</div>}

          {result && (
            <div style={{marginTop:30}}>
              <div style={{background:"#090909",border:`2px solid ${vColor(result.verdict)}`,borderRadius:8,padding:"18px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:vColor(result.verdict),fontSize:18,fontWeight:800,letterSpacing:"0.05em"}}>{vIcon(result.verdict)} {result.verdict}</div>
                  <div style={{color:"#888",fontSize:12,marginTop:6,maxWidth:"80%"}}>{result.verdictReason}</div>
                </div>
                <button onClick={pushToCRM} className="btn" style={{padding:"12px 24px", borderRadius:4, fontSize:11}}>
                    {pushStatus ? pushStatus : "PUSH TO COMMAND CENTER"}
                </button>
              </div>

              <div style={S.card}>
                <div style={S.sHead}>FORENSIC VAULT DATA</div>
                <div style={S.row2}>
                    <div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>COMPANY: </span><span style={{color:"#e5e5e5",fontSize:12}}>{result.company}</span></div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>FUNDING: </span><span style={{color:"#e5e5e5",fontSize:12}}>{result.fundingStage}</span></div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>LANE: </span><span style={{color:"var(--gold)",fontSize:12,fontWeight:"bold"}}>{result.lane}</span></div>
                    </div>
                    <div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>PLAN MATCH: </span><span style={{color:"#e5e5e5",fontSize:12}}>{result.intendedPlan}</span></div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>GAP STATUS: </span><span style={{color:"#e5e5e5",fontSize:12}}>{result.legalGapStatus}</span></div>
                    </div>
                </div>
                <div style={{marginTop:10, paddingTop:10, borderTop:"1px solid #1e1e1e"}}>
                    <span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>PRODUCT SIGNAL (TRIGGER):</span>
                    <span style={{color:"#aaa",fontSize:12,lineHeight:1.5}}>{result.productSignal}</span>
                </div>
              </div>

              <div style={S.card}>
                <div style={S.sHead}>ACTIVE TRAPS TRIGGERED</div>
                <div style={{display:"flex", gap:"8px", flexWrap:"wrap"}}>
                    {result.activeTraps && result.activeTraps.length > 0 ? 
                        result.activeTraps.map((t,i) => <span key={i} style={{background:"rgba(239, 68, 68, 0.1)", border:"1px solid rgba(239, 68, 68, 0.3)", color:"#ef4444", padding:"4px 10px", borderRadius:4, fontSize:11, fontWeight:600}}>{t}</span>) 
                        : <span style={{color:"#555", fontSize:12}}>No specific legal traps detected.</span>
                    }
                </div>
                <div style={{marginTop:14, paddingTop:14, borderTop:"1px solid #1e1e1e"}}>
                    <span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>GAP ANALYSIS:</span>
                    <span style={{color:"#aaa",fontSize:12,lineHeight:1.5}}>{result.legalGapAnalysis}</span>
                </div>
              </div>

              <div style={S.card}>
                <div style={S.sHead}>THE SPEAR (COLD EMAIL HOOK)</div>
                <div style={{background:"#050505",border:"1px solid #1e1e1e",borderRadius:6,padding:"16px"}}>
                  <div style={{color:"#C5A059",fontSize:11,marginBottom:12,fontWeight:600}}>Subject: {result.emailSubject}</div>
                  <div style={{color:"#e5e5e5",fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{result.personalizedHook}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ForensicEngineMaxGemini />);
  </script>
</body>
</html>
