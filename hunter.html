            await db.collection('prospects').doc(finalProspectId).set(prospectData);
            
            if (legacyDoc && legacyDoc.id !== finalProspectId) {
                await db.collection('prospects').doc(legacyDoc.id).delete();
                console.log(`[SYSTEM] Legacy migrated to ${finalProspectId}`);
            }

            setPushStatus(`Success! Locked: ${finalProspectId}`);
            
        } catch(e) {
            console.error(e);
            setPushStatus("ERROR: Bridge Failed.");
        }
      };

      const vColor = v => ({"GREEN LIGHT":"#22c55e","HOLD":"#eab308","SKIP":"#ef4444"}[v]||"#888");
      const vIcon  = v => ({"GREEN LIGHT":"🟢","HOLD":"🟡","SKIP":"🔴"}[v]||"⚪");

      const S = {
        root:{padding:"28px 20px",maxWidth:800,margin:"0 auto"},
        card:{background:"#0c0c0c",border:"1px solid #1e1e1e",borderRadius:8,padding:"20px",marginBottom:14},
        label:{color:"#666",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:5,display:"block"},
        sHead:{color:"#C5A059",fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14},
        input:{width:"100%",background:"#080808",border:"1px solid #252525",borderRadius:5,padding:"9px 11px",color:"#e5e5e5",fontSize:12,outline:"none",boxSizing:"border-box"},
        field:{marginBottom:13},
        row2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"},
        row3:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 14px"},
      };

      // ── LOGIN SCREEN ──
      if (authLoading) return <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",color:"var(--gold)"}}>Verifying clearance...</div>;
      
      if (!user) {
        return (
          <div style={{ display: "flex", height: "100vh", alignItems: "center", justifyContent: "center" }}>
            <div style={{ background: "#0c0c0c", padding: 40, border: "1px solid var(--gold)", width: 320 }}>
              <div style={{color:"#C5A059",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:6}}>LEX NOVA HQ</div>
              <h2 className="serif" style={{ color: "#fff", margin: "0 0 20px 0" }}>Forensic Engine v5.0</h2>
              {error && <div style={{color:"#f87171",fontSize:11,marginBottom:15}}>{error}</div>}
              <input type="email" placeholder="Admin Email" style={{...S.input, marginBottom:10}} onChange={e => setCreds(p => ({...p, email: e.target.value}))} />
              <input type="password" placeholder="Passcode" style={{...S.input, marginBottom:20}} onChange={e => setCreds(p => ({...p, password: e.target.value}))} />
              <button onClick={login} className="btn" style={{ width: "100%", padding: 12, borderRadius: 4 }}>Access Engine</button>
            </div>
          </div>
        );
      }

      // ── MAIN ENGINE UI ──
      return (
        <div style={S.root}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:24}}>
            <div>
              <div style={{color:"#C5A059",fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:6}}>LEX NOVA HQ · PROPRIETARY</div>
              <h1 style={{color:"#fff",fontSize:22,fontWeight:800,margin:"0 0 4px 0"}}>Forensic Engine <span style={{background:"#C5A05920",color:"#C5A059",fontSize:10,padding:"2px 8px",borderRadius:4,marginLeft:8,verticalAlign:"middle"}}>v5.0</span></h1>
              <p style={{color:"#444",fontSize:11,margin:0}}>Agentic Scrape · V3 Matrix Integration · Manual Spear Handoff</p>
            </div>
            <button onClick={() => auth.signOut()} style={{background:"none",border:"none",color:"#666",fontSize:10,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.1em"}}>Sign Out</button>
          </div>

          {/* PRE-SECTION: ENGINE SETUP */}
          <div style={S.card}>
            <div style={S.row2}>
              <div style={S.field}>
                <label style={S.label}>Engine / Model</label>
                <select value={selectedModel} onChange={e=>setSelectedModel(e.target.value)} style={{...S.input, borderColor:"var(--gold)", color:"var(--gold)"}}>
                  <option value="gemini-3.1-pro-preview">3.1 Pro (Deep Architect)</option>
                  <option value="gemini-3.1-flash-preview">3.1 Flash (High Speed Matrix Scrape)</option>
                  <option value="gemini-3.1-flash-lite-preview">3.1 Flash-Lite (Volume Hunting)</option>
                  <option value="gemini-2.5-pro">2.5 Pro (Legacy Stable)</option>
                  <option value="gemini-2.5-flash">2.5 Flash (Legacy Speed)</option>
                </select>
              </div>
              <div style={S.field}>
                <label style={S.label}>Gemini API Key (Local)</label>
                <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} style={S.input} placeholder="AIzaSy..." />
              </div>
            </div>
          </div>

          {/* SECTION 1: TARGET ACQUISITION (RECON) */}
          <div className="section-divider"><span>SECTION 1: RECON</span></div>
          <div style={S.card}>
            <div style={S.row2}>
              <div style={S.field}><label style={S.label}>Company Name *</label><input value={inp.companyName} onChange={e=>upd("companyName",e.target.value)} style={S.input} placeholder="Acme AI"/></div>
              <div style={S.field}><label style={S.label}>Website URL (Enables Auto-Scrape)</label><input value={inp.website} onChange={e=>upd("website",e.target.value)} style={S.input} placeholder="https://acmeai.com"/></div>
            </div>
            <div style={S.row2}>
                <div style={S.field}><label style={S.label}>Product Context (Override)</label><textarea rows={2} value={inp.productDescription} onChange={e=>upd("productDescription",e.target.value)} style={{...S.input,resize:"vertical"}} placeholder="Paste copy or leave blank..."/></div>
                <div style={S.field}><label style={S.label}>Legal Pages (Override)</label><textarea rows={2} value={inp.termsPage} onChange={e=>upd("termsPage",e.target.value)} style={{...S.input,resize:"vertical"}} placeholder="Paste ToS or leave blank..."/></div>
            </div>
            <button onClick={runAudit} disabled={loading} className="btn" style={{width:"100%", padding:"14px 0", borderRadius:6, marginTop:8}}>
              {loading ? `⚙  ${status||"RUNNING MATRIX AUDIT..."}` : `DEPLOY FORENSIC ENGINE →`}
            </button>
          </div>

          {error && <div style={{background:"#120808",border:"1px solid #2a0f0f",borderRadius:8,padding:"12px 16px",marginBottom:14,color:"#f87171",fontSize:12}}>⚠ {error}</div>}

          {/* SECTION 2: DASHBOARD */}
          {result && (
            <>
              <div className="section-divider"><span>SECTION 2: DASHBOARD</span></div>
              <div style={{background:"#090909",border:`2px solid ${vColor(result.verdict)}`,borderRadius:8,padding:"18px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:vColor(result.verdict),fontSize:18,fontWeight:800,letterSpacing:"0.05em"}}>{vIcon(result.verdict)} {result.verdict}</div>
                  <div style={{color:"#888",fontSize:12,marginTop:6,maxWidth:"100%"}}>{result.verdictReason}</div>
                </div>
              </div>

              <div style={S.card}>
                <div style={S.sHead}>COMPANY PROFILE</div>
                <div style={S.row2}>
                    <div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>COMPANY: </span><span style={{color:"#e5e5e5",fontSize:12}}>{result.company}</span></div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>FUNDING: </span><span style={{color:"#e5e5e5",fontSize:12}}>{result.fundingStage || 'Unknown'}</span></div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>LANE/PLAN: </span><span style={{color:"var(--gold)",fontSize:12,fontWeight:"bold"}}>{result.lane} / {result.intendedPlan}</span></div>
                    </div>
                    <div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>INT. CATEGORY: </span><span style={{color:"#e5e5e5",fontSize:12}}>{result.internalCategory}</span></div>
                        <div style={{marginBottom:10}}><span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase"}}>EXT. CATEGORY: </span><span style={{color:"#e5e5e5",fontSize:12}}>{result.externalCategory}</span></div>
                    </div>
                </div>
                <div style={{marginTop:10, paddingTop:10, borderTop:"1px solid #1e1e1e"}}>
                    <span style={{color:"#555",fontSize:10,fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:4}}>PRODUCT SIGNAL (TRIGGER):</span>
                    <span style={{color:"#aaa",fontSize:12,lineHeight:1.5}}>{result.productSignal}</span>
                </div>
              </div>

              <div style={S.card}>
                <div style={S.sHead}>V3 MATRIX: DETECTED GAPS</div>
                {result.detectedGaps && result.detectedGaps.length > 0 ? (
                  result.detectedGaps.map((g, i) => (
                    <div key={i} className={`gap-card ${g.severity.toLowerCase()}`}>
                      <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
                        <span style={{color:"#e5e5e5", fontSize:13, fontWeight:700}}>{g.gapName}</span>
                        <span style={{color: g.severity === 'NUCLEAR' ? '#ef4444' : '#f97316', fontSize:10, fontWeight:800, padding:"2px 6px", border:`1px solid ${g.severity === 'NUCLEAR' ? '#ef4444' : '#f97316'}`, borderRadius:4}}>{g.severity}</span>
                      </div>
                      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, fontSize:11, color:"#999"}}>
                        <div><strong style={{color:"#bbb"}}>Category:</strong> {g.category}</div>
                        <div><strong style={{color:"#bbb"}}>Liability:</strong> {g.liability}</div>
                        <div><strong style={{color:"#bbb"}}>Pain:</strong> {g.pain}</div>
                        <div><strong style={{color:"#bbb"}}>Est. Damage:</strong> <span style={{color:"#ef4444"}}>{g.damage}</span></div>
                      </div>
                    </div>
                  ))
                ) : (
                  <span style={{color:"#555", fontSize:12}}>No specific legal traps detected in current terms.</span>
                )}
                
                <button onClick={copyReportToClipboard} className="btn btn-outline" style={{width:"100%", padding:"12px 0", borderRadius:6, marginTop:14}}>
                  📋 COPY FULL FORENSIC REPORT FOR EMAIL GEM
                </button>
              </div>

              {/* SECTION 3: TARGET & PUSH */}
              <div className="section-divider"><span>SECTION 3: TARGET & PUSH</span></div>
              <div style={S.card}>
                <div style={S.sHead}>IDENTITY TRACKING (PRE-FILLED BY AGENT)</div>
                <div style={S.row3}>
                  <div style={S.field}><label style={S.label}>Founder Name</label><input value={inp.founderName} onChange={e=>upd("founderName",e.target.value)} style={S.input} /></div>
                  <div style={S.field}><label style={S.label}>Founder Title</label><input value={inp.founderTitle} onChange={e=>upd("founderTitle",e.target.value)} style={S.input} /></div>
                  <div style={S.field}><label style={S.label}>Target Email</label><input value={inp.email} onChange={e=>upd("email",e.target.value)} style={S.input} /></div>
                </div>

                <div style={{...S.sHead, marginTop:10}}>THE SPEAR (PASTE FROM GEM)</div>
                <div style={S.field}>
                  <label style={S.label}>Subject Line</label>
                  <input value={inp.spearSubject} onChange={e=>upd("spearSubject",e.target.value)} style={S.input} placeholder="e.g. acme's api execution" />
                </div>
                <div style={S.field}>
                  <label style={S.label}>Email Body (Hammer -> Chisel -> Consequence -> CTA)</label>
                  <textarea rows={5} value={inp.spearBody} onChange={e=>upd("spearBody",e.target.value)} style={{...S.input, resize:"vertical"}} placeholder="Paste the Founder-Tone Spear here... Make sure to leave the [PROSPECT_ID] placeholder intact." />
                </div>

                <div style={{...S.sHead, marginTop:10}}>CRM PUSH SETTINGS</div>
                <div style={{display:"flex", gap:10, marginBottom:16}}>
                    <select value={pillar} onChange={e=>setPillar(e.target.value)} style={{...S.input, padding:"8px", width:"120px"}}>
                        <option value="AI">Pillar: AI</option>
                        <option value="SS">Pillar: SS</option>
                    </select>
                    <input value={batchMonth} onChange={e=>setBatchMonth(e.target.value)} style={{...S.input, padding:"8px", width:"80px"}} placeholder="MM"/>
                    <input value={batchAlpha} onChange={e=>setBatchAlpha(e.target.value.toUpperCase())} style={{...S.input, padding:"8px", width:"80px"}} placeholder="A"/>
                </div>

                <button onClick={pushToCRM} className="btn" style={{width:"100%", padding:"16px 0", borderRadius:6, fontSize:14}}>
                    {pushStatus ? pushStatus : "PUSH TO COMMAND CENTER"}
                </button>
              </div>
            </>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ForensicEngineMaxGemini />);
  </script>
</body>
</html>
