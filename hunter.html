<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<title>Lex Nova Forensic Harvester v1.0</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="hunter-system.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --gold:#C5A059; --void:#050505; --surf:#0c0c0c; --border:#1e1e1e; --marble:#e5e5e5; --red:#ef4444; --orange:#f97316; --yellow:#eab308; --green:#22c55e; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--void); color:var(--marble); font-family:'Inter',sans-serif; overflow-x:hidden; }
    textarea,input,select { font-family:'Inter',sans-serif; }
    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }
    .btn { background:var(--gold); color:var(--void); font-weight:800; border:none; cursor:pointer; transition:all 0.2s; letter-spacing:0.08em; text-transform:uppercase; border-radius:4px; }
    .btn:hover:not(:disabled) { background:#e0b96b; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .section-divider { border-bottom:1px dashed #333; margin:28px 0; position:relative; }
    .section-divider span { position:absolute; top:-10px; left:20px; background:var(--void); padding:0 10px; color:#666; font-size:10px; font-weight:700; letter-spacing:0.1em; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;

  const FB_CONFIG = {
    apiKey:"AIzaSyDO4s_W8_87XnsLnuAfyUqgsF8BgaHRYWA",
    authDomain:"lexnova-hq.firebaseapp.com",
    projectId:"lexnova-hq",
    appId:"1:539475214055:web:c01a99ec94ff073a9b6c42"
  };
  if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ═══════════════════════════════════════════════════════════
  // ROOT APP
  // ═══════════════════════════════════════════════════════════
  function App() {
    const [user,      setUser]      = useState(null);
    const [authReady, setAuthReady] = useState(false);
    const [authError, setAuthError] = useState('');
    const [creds,     setCreds]     = useState({ email:'', password:'' });

    useEffect(() => {
      return auth.onAuthStateChanged(async u => {
        if (u) {
          try {
            const snap = await db.collection('admins').doc(u.email).get();
            if (snap.exists) {
              const d = snap.data();
              if (d.role === 'super_admin' || d.hunterAccess === true) {
                setUser({ ...u, adminData: d });
              } else {
                await auth.signOut();
                setAuthError('Access denied. Hunter clearance required.');
              }
            } else {
              await auth.signOut();
              setAuthError('Admin record not found.');
            }
          } catch(e) { await auth.signOut(); setAuthError('Auth check failed.'); }
        } else { setUser(null); }
        setAuthReady(true);
      });
    }, []);

    const login = async () => {
      setAuthError('');
      try { await auth.signInWithEmailAndPassword(creds.email, creds.password); }
      catch(e) { setAuthError('Invalid credentials.'); }
    };

    if (!authReady) return (
      <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',color:'var(--gold)',fontSize:12,letterSpacing:'0.1em'}}>
        VERIFYING CLEARANCE...
      </div>
    );

    if (!user) return (
      <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center'}}>
        <div style={{background:'#0c0c0c',padding:40,border:'1px solid var(--gold)',width:340,borderRadius:6}}>
          <div style={{color:'var(--gold)',fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:6}}>LEX NOVA HQ</div>
          <h2 style={{color:'#fff',margin:'0 0 6px 0',fontFamily:'Cormorant Garamond,serif',fontSize:22}}>Forensic Harvester</h2>
          <div style={{color:'#555',fontSize:10,marginBottom:24}}>Hunter clearance required</div>
          {authError && <div style={{color:'#f87171',fontSize:11,marginBottom:14,background:'rgba(239,68,68,0.08)',padding:'8px 10px',borderRadius:4}}>{authError}</div>}
          <input type="email" placeholder="Admin email"
            style={{width:'100%',background:'#080808',border:'1px solid #252525',borderRadius:4,padding:'9px 11px',color:'var(--marble)',fontSize:12,outline:'none',marginBottom:10}}
            onChange={e=>setCreds(p=>({...p,email:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&login()} />
          <input type="password" placeholder="Passcode"
            style={{width:'100%',background:'#080808',border:'1px solid #252525',borderRadius:4,padding:'9px 11px',color:'var(--marble)',fontSize:12,outline:'none',marginBottom:20}}
            onChange={e=>setCreds(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&login()} />
          <button onClick={login} className="btn" style={{width:'100%',padding:12,fontSize:11}}>Access Engine</button>
        </div>
      </div>
    );

    return <ForensicEngine user={user} />;
  }

  // ═══════════════════════════════════════════════════════════
  // FORENSIC HARVESTER ENGINE
  // ═══════════════════════════════════════════════════════════
  function ForensicEngine({ user }) {
    const [apiKey,  setApiKey]  = useState(() => localStorage.getItem('lnApiKey')||'');
    const [model,   setModel]   = useState('gemini-2.5-flash');
    const [loading, setLoading] = useState(false);
    const [status,  setStatus]  = useState('');
    const [error,   setError]   = useState('');
    const [result,  setResult]  = useState(null);
    const [pushMsg, setPushMsg] = useState('');

    const [inp, setInp] = useState({ website: '' });
    const upd = (k,v) => setInp(p=>({...p,[k]:v}));

    useEffect(() => { if(apiKey) localStorage.setItem('lnApiKey', apiKey); }, [apiKey]);

    // ── RUN DEEP HARVEST ──────────────────────────────────────────
    const runAudit = async () => {
      if (!apiKey) { setError('Gemini API key required.'); return; }
      if (!inp.website) { setError('Website URL required to initiate harvest.'); return; }

      setLoading(true); setError(''); setResult(null); setPushMsg('');
      let rawFootprint = '';

      try {
        const rootUrl = inp.website.startsWith('http') ? inp.website : 'https://' + inp.website;
        // The Zero-Backend Scraping Proxy
        const proxy = 'https://r.jina.ai/';

        setStatus('[sys] Target locked. Ingesting root domain...');
        const rootRes = await fetch(proxy + rootUrl);
        const rootText = await rootRes.text();
        rawFootprint += `\n\n--- ZONE 2 (COMMERCIAL): HOMEPAGE ---\n${rootText}`;

        setStatus('[sys] Parsing site map for Zone-specific links...');
        
        // Regex to extract markdown links returned by Jina: [Text](url)
        const linkRegex = /\[([^\]]+)\]\((https?:\/\/[^\s)]+|\/[^\s)]+)\)/g;
        let match;
        const links = new Map();

        while ((match = linkRegex.exec(rootText)) !== null) {
          let text = match[1].toLowerCase();
          let href = match[2];
          // Convert relative links to absolute
          if (href.startsWith('/')) href = new URL(href, rootUrl).href;
          // Keep only internal links
          if (href.includes(rootUrl.replace('https://', '').replace('http://', '').split('/')[0])) {
            links.set(href, text);
          }
        }

        // Zone Routing Logic
        const targets = new Set();
        links.forEach((text, href) => {
          const str = (text + " " + href).toLowerCase();
          // ZONE 1: Mechanical
          if (/platform|product|tech|how it works|feature|api/i.test(str)) targets.add({url: href, zone: 'ZONE 1 (MECHANICAL)'});
          // ZONE 2: Commercial
          if (/pricing|solution|enterprise|use case/i.test(str)) targets.add({url: href, zone: 'ZONE 2 (COMMERCIAL)'});
          // ZONE 3: Governance
          if (/terms|privacy|dpa|security|legal|cookie|acceptable/i.test(str)) targets.add({url: href, zone: 'ZONE 3 (GOVERNANCE)'});
          // ZONE 4: Context
          if (/about|team|company|founder/i.test(str)) targets.add({url: href, zone: 'ZONE 4 (CONTEXT)'});
        });

        // Deduplicate and limit to 8 pages to avoid API timeouts
        const uniqueTargets = Array.from(targets).filter((v,i,a) => a.findIndex(t => (t.url === v.url)) === i).slice(0, 8);

        for (let i = 0; i < uniqueTargets.length; i++) {
          const t = uniqueTargets[i];
          setStatus(`[sys] Extracting ${t.zone} target: ${t.url.split('/').pop()}...`);
          try {
            const res = await fetch(proxy + t.url);
            const text = await res.text();
            rawFootprint += `\n\n--- ${t.zone}: ${t.url} ---\n${text}`;
          } catch(e) {
            console.warn("Failed to fetch target:", t.url);
          }
        }

        setStatus('[sys] Scrubbing raw footprint with Gemini 2.5 Flash...');
        
        // The Cleaning Prompt
        const geminiPrompt = `You are the Lex Nova Forensic Harvester. I am providing you with raw scraped markdown from multiple pages of a target website. 
        Your ONLY job is to clean this data. Remove all navigational menus, footer links, social media links, and irrelevant fluff. 
        Keep all descriptive text, mechanical features, marketing claims, and verbatim legal clauses. 
        Format it cleanly by the 4 Zones.
        START your output exactly with the string "FOOTPRINT: ${rootUrl}" and nothing else.
        
        RAW DATA:
        ${rawFootprint}`;

        const aiRes = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
          {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              contents: [{ role:'user', parts:[{ text: geminiPrompt }] }],
              generationConfig: { temperature: 0.1 }
            })
          }
        );

        const data = await aiRes.json();
        if (data.error) throw new Error(data.error.message);

        const finalFootprint = data.candidates[0].content.parts[0].text;
        setResult(finalFootprint);
        setStatus('[sys] Harvest Complete. Payload ready.');

      } catch(e) { setError('Harvest failed: ' + e.message); }
      setLoading(false);
    };

    // ── STYLES ─────────────────────────────────────────────
    const S = {
      root:  { padding:'28px 20px', maxWidth:820, margin:'0 auto' },
      card:  { background:'#0c0c0c', border:'1px solid #1e1e1e', borderRadius:8, padding:'20px', marginBottom:14 },
      label: { color:'#666', fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:5, display:'block' },
      sHead: { color:'var(--gold)', fontSize:10, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:14 },
      input: { width:'100%', background:'#080808', border:'1px solid #252525', borderRadius:5, padding:'9px 11px', color:'var(--marble)', fontSize:12, outline:'none' },
      field: { marginBottom:13 },
      row2:  { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 14px' },
    };

    return (
      <div style={S.root}>

        {/* HEADER */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:24}}>
          <div>
            <div style={{color:'var(--gold)',fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:6}}>LEX NOVA HQ · EXTRACTION TERMINAL</div>
            <h1 style={{color:'#fff',fontSize:22,fontWeight:800,margin:'0 0 4px 0'}}>
              Forensic Harvester <span style={{background:'rgba(197,160,89,0.1)',color:'var(--gold)',fontSize:10,padding:'2px 8px',borderRadius:4,marginLeft:8,verticalAlign:'middle'}}>v1.0</span>
            </h1>
            <p style={{color:'#555',fontSize:11,margin:0}}>Autonomous Spidering · Jina Proxy · Zone Scrubbing</p>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{color:'#555',fontSize:10,marginBottom:4}}>{user.email}</div>
            <button onClick={()=>auth.signOut()} style={{background:'none',border:'none',color:'#666',fontSize:10,cursor:'pointer',textTransform:'uppercase',letterSpacing:'0.1em'}}>Sign Out</button>
          </div>
        </div>

        {/* ENGINE SETUP */}
        <div style={S.card}>
          <div style={S.row2}>
            <div style={S.field}>
              <label style={S.label}>Scrubbing Model</label>
              <select value={model} onChange={e=>setModel(e.target.value)} style={{...S.input,borderColor:'var(--gold)',color:'var(--gold)'}}>
                <option value="gemini-2.5-flash">2.5 Flash (Recommended)</option>
                <option value="gemini-2.5-pro">2.5 Pro (High Accuracy)</option>
                <option value="gemini-3.1-flash">3.1 Flash (Speed)</option>
              </select>
            </div>
            <div style={S.field}>
              <label style={S.label}>Gemini API Key</label>
              <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} style={S.input} placeholder="AIzaSy..." />
            </div>
          </div>
        </div>

        {/* SECTION 1 — TARGET ACQUISITION */}
        <div className="section-divider"><span>SECTION 1 — TARGET ACQUISITION</span></div>
        <div style={S.card}>
          <div style={S.field}>
            <label style={S.label}>Target URL</label>
            <input 
              value={inp.website} 
              onChange={e=>upd('website', e.target.value)} 
              style={{...S.input, fontSize:'16px', padding:'14px', borderColor:'var(--gold)', color:'var(--gold)'}} 
              placeholder="dyaniahealth.com"
              onKeyDown={e=>e.key==='Enter'&&runAudit()}
            />
          </div>
          
          <button onClick={runAudit} disabled={loading} className="btn" style={{width:'100%', padding:'16px 0', fontSize:'14px', marginTop:'8px'}}>
            {loading ? `[ WORKING ]` : 'INITIATE DEEP HARVEST'}
          </button>

          {/* TELEMETRY TERMINAL */}
          {status && (
            <div style={{marginTop:'14px', padding:'10px', background:'#050505', border:'1px solid #1a1a1a', borderRadius:'4px', color:'#22c55e', fontFamily:'monospace', fontSize:'11px', letterSpacing:'0.05em'}}>
              {status}
            </div>
          )}
        </div>

        {/* ERROR */}
        {error && (
          <div style={{background:'rgba(239,68,68,0.08)', border:'1px solid rgba(239,68,68,0.2)', borderRadius:'8px', padding:'12px 16px', marginTop:'14px', color:'#f87171', fontSize:'12px'}}>
            ⚠ {error}
          </div>
        )}

        {/* SECTION 2 — RAW FOOTPRINT PAYLOAD */}
        {result && <>
          <div className="section-divider"><span>SECTION 2 — EXTRACTION PAYLOAD</span></div>
          <div style={S.card}>
            <button 
              className="btn" 
              style={{width:'100%', padding:'14px', marginBottom:'14px', background:'var(--green)', color:'#000'}}
              onClick={() => {
                navigator.clipboard.writeText(result);
                setPushMsg('✓ COPIED TO CLIPBOARD');
                setTimeout(() => setPushMsg(''), 3000);
              }}
            >
              {pushMsg || '📋 COPY FOOTPRINT TO CLIPBOARD'}
            </button>
            <textarea 
              readOnly 
              value={result} 
              style={{width:'100%', height:'500px', background:'#000', color:'#ccc', border:'1px solid #333', borderRadius:'4px', padding:'14px', fontFamily:'monospace', fontSize:'11px', lineHeight:'1.5'}}
            />
          </div>
        </>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
